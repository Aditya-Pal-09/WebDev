{% extends "base.html" %}

{% block content %}
<h2>Events</h2>

<input type="text" id="search" placeholder="Search events..." onkeyup="searchEvents()">

<div class="events" id="eventList">
    {% for event in events %}
    <div class="card">
        <h3>{{ event.name }}</h3>
        <p>{{ event.date }}</p>
        <p>{{ event.venue }}</p>
        <p>RSVP: {{ event.rsvp }}</p>
        <a href="/register" class="btn">Register</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
